stiggchart:
  serverApiKey: "<SERVER_API_KEY>"
  sidecar:
    imageTag: "latest"
  persistentCache: 
    enabled: true
    redis:
      environmentPrefix: "production"
      host: "redis"
      port: "6379"
      db: "0"
      username: "default"
      password: "myredispassword"
      tls: true
    awsRegion: "us-east-2"
    queueUrl: "<SQS_QUEUE_URL>"
  extraDeploy:
    - apiVersion: v1
      kind: ConfigMap
      metadata:
        name: example-extra-configmap
        labels:
          app: example-app
      data:
        test-key: "test-value"