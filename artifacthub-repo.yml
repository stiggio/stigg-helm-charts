# Artifact Hub repository metadata.
#
# This file must be served at the ROOT of the Helm repository — i.e. the root
# of the gh-pages branch, alongside index.yaml. The release workflow
# (.github/workflows/release-chart.yml) copies it there automatically.
#
# Get the repositoryID from Artifact Hub:
#   Control Panel -> Repositories -> stigg-helm-charts -> info menu -> "Get repository ID"
# Replace the placeholder below; until then ownership verification is skipped
# (harmless — the repo still works, it just won't show the verified badge).
repositoryID: REPLACE_WITH_ARTIFACT_HUB_REPOSITORY_ID

# Optional: lets these users claim/transfer ownership via the Artifact Hub CLI.
# Emails must match verified Artifact Hub accounts.
owners:
  - name: Stigg
    email: yotam@stigg.io
