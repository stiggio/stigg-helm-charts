- op: add
  path: /spec/template/spec/containers/-
  value:
    name: stigg-sidecar
    image: public.ecr.aws/stigg/sidecar:latest
    env:
      - name: SERVER_API_KEY
        valueFrom:
          secretKeyRef:
            name: stigg-api-keys
            key: SERVER_API_KEY
      - name: REDIS_ENVIRONMENT_PREFIX
        valueFrom:
          configMapKeyRef:
            name: stigg-conf
            key: REDIS_ENVIRONMENT_PREFIX
      - name: REDIS_HOST
        valueFrom:
          configMapKeyRef:
            name: stigg-conf
            key: REDIS_HOST
      - name: REDIS_PORT
        valueFrom:
          configMapKeyRef:
            name: stigg-conf
            key: REDIS_PORT
      - name: REDIS_DB
        valueFrom:
          configMapKeyRef:
            name: stigg-conf
            key: REDIS_DB
      - name: REDIS_TLS
        valueFrom:
          configMapKeyRef:
            name: stigg-conf
            key: REDIS_TLS
      - name: REDIS_USERNAME
        valueFrom:
          secretKeyRef:
            name: stigg-redis-auth
            key: REDIS_USERNAME
      - name: REDIS_PASSWORD
        valueFrom:
          secretKeyRef:
            name: stigg-redis-auth
            key: REDIS_PASSWORD