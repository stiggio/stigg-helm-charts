name: Test Deployment on Minikube

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  minikube-deploy-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Minikube
        uses: medyagh/setup-minikube@v0.0.20

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Deploy with Helm
        run: |
          export NAMESPACE=helm
          kubectl create ns ${NAMESPACE}
          cp -r stigg-chart example-app-chart/charts
          helm install -n ${NAMESPACE} example-app ./example-app-chart
          echo "Waiting for pods to be ready in namespace ${NAMESPACE}..."
          kubectl wait --for=condition=Ready pod --all -n ${NAMESPACE} --timeout=180s
          kubectl get pods -n ${NAMESPACE}

      - name: Port-forward app pod in helm namespace and test
        run: |
          APP_POD=$(kubectl get pods -n helm -l app=app -o jsonpath='{.items[0].metadata.name}')
          kubectl port-forward -n helm $APP_POD 9090:9090 &
          sleep 5
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}\n" "http://localhost:9090?customer_id=customer-demo-01&feature_id=feature-01-templates")
          echo "$RESPONSE"
          STATUS=$(echo "$RESPONSE" | grep HTTP_STATUS | cut -d: -f2)
          if [ "$STATUS" -eq 500 ]; then
            echo "Received HTTP 500 from app pod in helm namespace"
            exit 1
          fi

      - name: Check Redis keys in helm namespace
        run: |
          COUNT=$(kubectl run -i redis-client -n helm --rm --image=redis:7.2.4 --restart=Never -- redis-cli -h redis -p 6379 DBSIZE | head -n 1)
          echo "Redis key count in helm namespace: $COUNT"
          if [ "$COUNT" -eq 0 ]; then
            echo "No keys found in Redis in helm namespace"
            exit 1
          fi

      - name: Deploy with Kubectl/Kustomize
        run: |
          export NAMESPACE="no-helm"
          kubectl create ns ${NAMESPACE}
          helm template stigg ./stigg-chart > kustomize/generated/stigg-manifests.yaml
          kubectl kustomize kustomize > kustomize/generated/app-manifests.yaml
          kubectl apply -n ${NAMESPACE} -f kustomize/generated/stigg-manifests.yaml
          kubectl apply -n ${NAMESPACE} -f kustomize/redis.yaml
          kubectl apply -n ${NAMESPACE} -f kustomize/generated/app-manifests.yaml
          echo "Waiting for pods to be ready in namespace ${NAMESPACE}..."
          kubectl wait --for=condition=Ready pod --all -n ${NAMESPACE} --timeout=180s
          kubectl get pods -n ${NAMESPACE}

      - name: Port-forward app pod in no-helm namespace and test
        run: |
          APP_POD=$(kubectl get pods -n no-helm -l app=app -o jsonpath='{.items[0].metadata.name}')
          kubectl port-forward -n no-helm $APP_POD 9090:9090 &
          sleep 5
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}\n" "http://localhost:9090?customer_id=customer-demo-01&feature_id=feature-01-templates")
          echo "$RESPONSE"
          STATUS=$(echo "$RESPONSE" | grep HTTP_STATUS | cut -d: -f2)
          if [ "$STATUS" -eq 500 ]; then
            echo "Received HTTP 500 from app pod in no-helm namespace"
            exit 1
          fi

      - name: Check Redis keys in no-helm namespace
        run: |
          COUNT=$(kubectl run -i redis-client -n no-helm --rm --image=redis:7.2.4 --restart=Never -- redis-cli -h redis -p 6379 DBSIZE | head -n 1)
          echo "Redis key count in no-helm namespace: $COUNT"
          if [ "$COUNT" -eq 0 ]; then
            echo "No keys found in Redis in no-helm namespace"
            exit 1
          fi

      - name: Dump pod logs and describe (helm namespace)
        if: failure()
        run: |
          echo "=== Pod describe (helm) ==="
          kubectl describe pods -n helm || true
          echo "=== Pod logs (helm) ==="
          for pod in $(kubectl get pods -n helm -o jsonpath='{.items[*].metadata.name}'); do
            echo "--- Logs for $pod ---"
            kubectl logs -n helm $pod || true
          done

      - name: Dump pod logs and describe (no-helm namespace)
        if: failure()
        run: |
          echo "=== Pod describe (no-helm) ==="
          kubectl describe pods -n no-helm || true
          echo "=== Pod logs (no-helm) ==="
          for pod in $(kubectl get pods -n no-helm -o jsonpath='{.items[*].metadata.name}'); do
            echo "--- Logs for $pod ---"
            kubectl logs -n no-helm $pod || true
          done