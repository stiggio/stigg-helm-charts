- op: add
  path: /spec/template/spec/containers/0/env/-
  value:
    name: SERVER_API_KEY
    valueFrom:
      secretKeyRef:
        name: stigg-api-keys
        key: SERVER_API_KEY
- op: add
  path: /spec/template/spec/containers/0/env/-
  value:
    name: CLIENT_API_KEY
    valueFrom:
      secretKeyRef:
        name: stigg-api-keys
        key: CLIENT_API_KEY
