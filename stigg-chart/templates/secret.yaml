{{- if not .Values.apiKeysSecretName }}
# store stigg api keys to be used by apps and sidecars
apiVersion: v1
kind: Secret
metadata:
  name: stigg-api-keys
type: Opaque
data:
  SERVER_API_KEY: {{ .Values.serverApiKey | b64enc | quote }}
  CLIENT_API_KEY: {{ .Values.clientApiKey | b64enc | quote }}
{{- end }}
---
{{- if or .Values.redisUsername .Values.redisPassword }}
# store redis credentials
apiVersion: v1
kind: Secret
metadata:
  name: stigg-redis-auth
type: Opaque
data:
{{- if .Values.redisUsername }}
  REDIS_USERNAME: {{ .Values.redisUsername | b64enc | quote }}
{{- end }}
{{- if .Values.redisPassword }}
  REDIS_PASSWORD: {{ .Values.redisPassword | b64enc | quote }}
{{- end }}
{{- end }}
