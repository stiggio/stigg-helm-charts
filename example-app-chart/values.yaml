stiggchart:
  serverApiKey: "<SERVER_API_KEY>"
  sidecarImageTag: "latest"
  persistentCache: true
  redisEnvironmentPrefix: "production"
  redisHost: "redis"
  redisPort: "6379"
  redisDb: "0"
  redisUsername: "default"
  redisPassword: "myredispassword"
  redisTls: true
  awsRegion: "us-east-2"
  queueUrl: "<SQS_QUEUE_URL>"
  extraDeploy:
    - apiVersion: v1
      kind: ConfigMap
      metadata:
        name: example-extra-configmap
        labels:
          app: example-app
      data:
        test-key: "test-value"