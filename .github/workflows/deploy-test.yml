name: Test Deployment on Minikube

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  helm-deploy-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Minikube
        uses: medyagh/setup-minikube@v0.0.20
        with:
          cache: true

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Generate Redis TLS certificates
        run: |
          openssl req -x509 -newkey rsa:2048 -keyout redis-tls.key -out redis-tls.crt -days 365 -nodes -subj "/CN=redis"
          cp redis-tls.crt redis-ca.crt

      - name: Patch values.yaml files with secrets
        env:
          STIGG_SERVER_API_KEY: ${{ secrets.STIGG_SERVER_API_KEY }}
          STIGG_QUEUE_URL: ${{ secrets.STIGG_QUEUE_URL }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        run: |
          sed -i "s|^\\( *serverApiKey: *\\).*|\\1\"${STIGG_SERVER_API_KEY}\"|" example-app-chart/values.yaml
          sed -i "s|^\\( *queueUrl: *\\).*|\\1\"${STIGG_QUEUE_URL}\"|" example-app-chart/values.yaml
          sed -i "s|^\\( *redisPassword: *\\).*|\\1\"${REDIS_PASSWORD}\"|" example-app-chart/values.yaml

      - name: Deploy with Helm
        run: |
          export NAMESPACE=helm
          kubectl create ns ${NAMESPACE}
          
          # Create Redis TLS secret
          kubectl create secret generic redis-tls-certs -n ${NAMESPACE} \
            --from-file=tls.crt=redis-tls.crt \
            --from-file=tls.key=redis-tls.key \
            --from-file=ca.crt=redis-ca.crt
          
          cp -r stigg-chart example-app-chart/charts
          helm install -n ${NAMESPACE} example-app ./example-app-chart
          echo "Waiting for pods to be ready in namespace ${NAMESPACE}..."
          kubectl wait --for=condition=Ready pod --all -n ${NAMESPACE} --timeout=180s
          kubectl get pods -n ${NAMESPACE}

      - name: Port-forward app pod in helm namespace and test
        run: |
          export NAMESPACE=helm
          APP_POD=$(kubectl get pods -n ${NAMESPACE} -l app=app -o jsonpath='{.items[0].metadata.name}')
          kubectl port-forward -n ${NAMESPACE} $APP_POD 9090:9090 &
          sleep 5
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}\n" "http://localhost:9090?customer_id=helm-ci&feature_id=feature-join-community")
          echo "$RESPONSE"
          STATUS=$(echo "$RESPONSE" | grep HTTP_STATUS | cut -d: -f2)
          if [ "$STATUS" -ne 200 ]; then
            echo "Received HTTP $STATUS from app pod in ${NAMESPACE} namespace"
            exit 1
          fi

      - name: Check Redis keys in helm namespace
        env:
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        run: |
          export NAMESPACE=helm
          COUNT=$(kubectl run -i redis-client -n ${NAMESPACE} --rm --image=redis:7.2.4 --restart=Never -- redis-cli -h redis -p 6379 --tls --insecure -a ${REDIS_PASSWORD} DBSIZE | head -n 1)
          echo "Redis key count in ${NAMESPACE} namespace: $COUNT"
          if [ "$COUNT" -eq 0 ]; then
            echo "No keys found in Redis in ${NAMESPACE} namespace"
            exit 1
          fi

      - name: Check extra ConfigMap deployment
        run: |
          export NAMESPACE=helm
          kubectl get configmap example-extra-configmap -n ${NAMESPACE}
          kubectl get configmap example-extra-configmap -n ${NAMESPACE} -o yaml
          VALUE=$(kubectl get configmap example-extra-configmap -n ${NAMESPACE} -o jsonpath='{.data.test-key}')
          if [ "$VALUE" != "test-value" ]; then
            echo "ConfigMap test-key value is not correct: $VALUE"
            exit 1
          fi

      - name: Dump pod logs and describe (helm namespace)
        if: failure()
        run: |
          export NAMESPACE=helm
          echo "=== Pod describe (${NAMESPACE}) ==="
          kubectl describe pods -n ${NAMESPACE} || true
          echo "=== Pod logs (${NAMESPACE}) ==="
          for pod in $(kubectl get pods -n ${NAMESPACE} -o jsonpath='{.items[*].metadata.name}'); do
            echo "--- Logs for $pod ---"
            kubectl logs -n ${NAMESPACE} $pod | true
          done
          echo "=== ConfigMaps (${NAMESPACE}) ==="
          kubectl get configmap -n ${NAMESPACE}

  kustomize-deploy-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Minikube
        uses: medyagh/setup-minikube@v0.0.20
        with:
          cache: true

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Generate Redis TLS certificates
        run: |
          openssl req -x509 -newkey rsa:2048 -keyout redis-tls.key -out redis-tls.crt -days 365 -nodes -subj "/CN=redis"
          cp redis-tls.crt redis-ca.crt

      - name: Patch values.yaml files with secrets
        env:
          STIGG_SERVER_API_KEY: ${{ secrets.STIGG_SERVER_API_KEY }}
          STIGG_QUEUE_URL: ${{ secrets.STIGG_QUEUE_URL }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        run: |
          sed -i "s|^\\( *serverApiKey: *\\).*|\\1\"${STIGG_SERVER_API_KEY}\"|" stigg-chart/values.yaml
          sed -i "s|^\\( *queueUrl: *\\).*|\\1\"${STIGG_QUEUE_URL}\"|" stigg-chart/values.yaml
          sed -i "s|^\\( *persistentCache: *\\).*|\\1true|" stigg-chart/values.yaml
          sed -i "s|^\\( *redisEnvironmentPrefix: *\\).*|\\1production|" stigg-chart/values.yaml
          sed -i "s|^\\( *redisHost: *\\).*|\\1redis|" stigg-chart/values.yaml
          sed -i "s|^\\( *redisPassword: *\\).*|\\1\"${REDIS_PASSWORD}\"|" stigg-chart/values.yaml
          sed -i "s|^\\( *redisTls: *\\).*|\\1true|" stigg-chart/values.yaml
          sed -i "s|^\\( *awsRegion: *\\).*|\\1us-east-2|" stigg-chart/values.yaml

      - name: Deploy with Kubectl/Kustomize
        run: |
          export NAMESPACE=no-helm
          kubectl create ns ${NAMESPACE}
          
          # Create Redis TLS secret
          kubectl create secret generic redis-tls-certs -n ${NAMESPACE} \
            --from-file=tls.crt=redis-tls.crt \
            --from-file=tls.key=redis-tls.key \
            --from-file=ca.crt=redis-ca.crt
          
          helm template stigg ./stigg-chart > kustomize/generated/stigg-manifests.yaml
          kubectl kustomize kustomize > kustomize/generated/app-manifests.yaml
          kubectl apply -n ${NAMESPACE} -f kustomize/generated/stigg-manifests.yaml
          kubectl apply -n ${NAMESPACE} -f kustomize/redis.yaml
          kubectl apply -n ${NAMESPACE} -f kustomize/generated/app-manifests.yaml
          echo "Waiting for pods to be ready in namespace ${NAMESPACE}..."
          kubectl wait --for=condition=Ready pod --all -n ${NAMESPACE} --timeout=180s
          kubectl get pods -n ${NAMESPACE}

      - name: Port-forward app pod in no-helm namespace and test
        run: |
          export NAMESPACE=no-helm
          APP_POD=$(kubectl get pods -n ${NAMESPACE} -l app=app -o jsonpath='{.items[0].metadata.name}')
          kubectl port-forward -n ${NAMESPACE} $APP_POD 9091:9090 &
          sleep 5
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}\n" "http://localhost:9091?customer_id=helm-ci&feature_id=feature-join-community")
          echo "$RESPONSE"
          STATUS=$(echo "$RESPONSE" | grep HTTP_STATUS | cut -d: -f2)
          if [ "$STATUS" -ne 200 ]; then
            echo "Received HTTP $STATUS from app pod in ${NAMESPACE} namespace"
            exit 1
          fi

      - name: Check Redis keys in no-helm namespace
        env:
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        run: |
          export NAMESPACE=no-helm
          COUNT=$(kubectl run -i redis-client -n ${NAMESPACE} --rm --image=redis:7.2.4 --restart=Never -- redis-cli -h redis -p 6379 --tls --insecure -a ${REDIS_PASSWORD} DBSIZE | head -n 1)
          echo "Redis key count in ${NAMESPACE} namespace: $COUNT"
          if [ "$COUNT" -eq 0 ]; then
            echo "No keys found in Redis in ${NAMESPACE} namespace"
            exit 1
          fi

      - name: Dump pod logs and describe (no-helm namespace)
        if: failure()
        run: |
          export NAMESPACE=no-helm
          echo "=== Pod describe (${NAMESPACE}) ==="
          kubectl describe pods -n ${NAMESPACE} || true
          echo "=== Pod logs (${NAMESPACE}) ==="
          for pod in $(kubectl get pods -n ${NAMESPACE} -o jsonpath='{.items[*].metadata.name}'); do
            echo "--- Logs for $pod ---"
            kubectl logs -n ${NAMESPACE} $pod | true
          done
          kubectl get configmap -n ${NAMESPACE}

  helm-deploy-test-custom-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Minikube
        uses: medyagh/setup-minikube@v0.0.20
        with:
          cache: true

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Generate Redis TLS certificates
        run: |
          openssl req -x509 -newkey rsa:2048 -keyout redis-tls.key -out redis-tls.crt -days 365 -nodes -subj "/CN=redis"
          cp redis-tls.crt redis-ca.crt

      - name: Create custom stigg secret
        run: |
          export NAMESPACE=helm-custom
          kubectl create ns ${NAMESPACE}
          kubectl create secret generic custom-stigg-api-keys \
            --from-literal=stigg_server_api_key=${{ secrets.STIGG_SERVER_API_KEY }} \
            --from-literal=stigg_client_api_key="" \
            -n ${NAMESPACE}

      - name: Patch values.yaml files with secrets
        env:
          STIGG_QUEUE_URL: ${{ secrets.STIGG_QUEUE_URL }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        run: |
          sed -i "s|^\( *queueUrl: *\).*|\1\"${STIGG_QUEUE_URL}\"|" example-app-chart/values.yaml
          sed -i "s|^\\( *redisPassword: *\\).*|\\1\"${REDIS_PASSWORD}\"|" example-app-chart/values.yaml

      - name: Deploy with Helm (custom secret)
        run: |
          export NAMESPACE=helm-custom
          
          # Create Redis TLS secret
          kubectl create secret generic redis-tls-certs -n ${NAMESPACE} \
            --from-file=tls.crt=redis-tls.crt \
            --from-file=tls.key=redis-tls.key \
            --from-file=ca.crt=redis-ca.crt
          
          cp -r stigg-chart example-app-chart/charts
          helm install -n ${NAMESPACE} example-app ./example-app-chart \
            --set stiggchart.apiKeysSecretName=custom-stigg-api-keys
          echo "Waiting for pods to be ready in namespace ${NAMESPACE}..."
          kubectl wait --for=condition=Ready pod --all -n ${NAMESPACE} --timeout=180s
          kubectl get pods -n ${NAMESPACE}

      - name: Port-forward app pod in helm-custom namespace and test
        run: |
          export NAMESPACE=helm-custom
          APP_POD=$(kubectl get pods -n ${NAMESPACE} -l app=app -o jsonpath='{.items[0].metadata.name}')
          kubectl port-forward -n ${NAMESPACE} $APP_POD 9092:9090 &
          sleep 5
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}\n" "http://localhost:9092?customer_id=helm-ci&feature_id=feature-join-community")
          echo "$RESPONSE"
          STATUS=$(echo "$RESPONSE" | grep HTTP_STATUS | cut -d: -f2)
          if [ "$STATUS" -ne 200 ]; then
            echo "Received HTTP $STATUS from app pod in ${NAMESPACE} namespace"
            exit 1
          fi

      - name: Check Redis keys in helm-custom namespace
        env:
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        run: |
          export NAMESPACE=helm-custom
          COUNT=$(kubectl run -i redis-client -n ${NAMESPACE} --rm --image=redis:7.2.4 --restart=Never -- redis-cli -h redis -p 6379 --tls --insecure -a ${REDIS_PASSWORD} DBSIZE | head -n 1)
          echo "Redis key count in ${NAMESPACE} namespace: $COUNT"
          if [ "$COUNT" -eq 0 ]; then
            echo "No keys found in Redis in ${NAMESPACE} namespace"
            exit 1
          fi

      - name: Check extra ConfigMap deployment
        run: |
          export NAMESPACE=helm-custom
          kubectl get configmap example-extra-configmap -n ${NAMESPACE}
          kubectl get configmap example-extra-configmap -n ${NAMESPACE} -o yaml
          VALUE=$(kubectl get configmap example-extra-configmap -n ${NAMESPACE} -o jsonpath='{.data.test-key}')
          if [ "$VALUE" != "test-value" ]; then
            echo "ConfigMap test-key value is not correct: $VALUE"
            exit 1
          fi

      - name: Dump pod logs and describe (helm-custom namespace)
        if: failure()
        run: |
          export NAMESPACE=helm-custom
          echo "=== Pod describe (${NAMESPACE}) ==="
          kubectl describe pods -n ${NAMESPACE} || true
          echo "=== Pod logs (${NAMESPACE}) ==="
          for pod in $(kubectl get pods -n ${NAMESPACE} -o jsonpath='{.items[*].metadata.name}'); do
            echo "--- Logs for $pod ---"
            kubectl logs -n ${NAMESPACE} $pod | true
          done
          echo "=== ConfigMaps (${NAMESPACE}) ==="
          kubectl get configmap -n ${NAMESPACE}